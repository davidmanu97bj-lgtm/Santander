name: Build EXPLORA APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Descomprimir proyecto Android
        run: |
          mkdir extracted
          unzip "*.zip" -d extracted
          echo "Contenido descomprimido:"
          find extracted -maxdepth 3 -type f | head -100

      - name: Buscar carpeta del proyecto
        run: |
          PROJECT_DIR=$(find extracted -name "settings.gradle" -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Proyecto encontrado en: $PROJECT_DIR"

      - name: Dar permiso a Gradle
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Compilar APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug

      - name: Subir APK generado
        uses: actions/upload-artifact@v4
        with:
          name: EXPLORA-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
